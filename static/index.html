<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deupoly</title>
  <style>
    :root {
      --bg: #f7f4ed;
      --panel: rgba(255, 252, 244, 0.9);
      --ink: #1c1d21;
      --accent: #bb3e03;
      --accent-soft: #fed7aa;
      --line: rgba(28, 29, 33, 0.12);
      --ok: #2d6a4f;
      --warn: #9b2226;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(250, 204, 21, 0.3), transparent 30%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.15), transparent 28%),
        linear-gradient(135deg, #f7f4ed 0%, #fff8e8 100%);
    }

    .layout {
      display: grid;
      gap: 16px;
      grid-template-columns: 380px 1fr;
      padding: 24px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
    }

    h1, h2, h3 {
      margin: 0 0 12px;
      font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
    }

    h1 {
      font-size: 28px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    input, button, textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 12px 14px;
      font: inherit;
      background: white;
    }

    button {
      cursor: pointer;
      font-weight: 600;
      background: var(--accent);
      color: white;
      border: none;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button.secondary {
      background: #243b53;
    }

    button.warn {
      background: var(--warn);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(11, minmax(0, 1fr));
      grid-template-rows: repeat(11, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
      aspect-ratio: 1 / 1;
      align-self: start;
    }

    .board-center,
    .tile {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.75);
    }

    .board-center {
      grid-column: 2 / 11;
      grid-row: 2 / 11;
      display: grid;
      place-items: center;
      text-align: center;
      background:
        radial-gradient(circle at top, rgba(187, 62, 3, 0.12), transparent 35%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 248, 232, 0.92));
      border-style: dashed;
    }

    .board-center strong {
      display: block;
      font-size: 28px;
      font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
      margin-bottom: 8px;
    }

    .tile {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 4px;
      padding: 8px;
      font-size: 12px;
    }

    .tile strong {
      font-size: 12px;
      line-height: 1.2;
    }

    .tile.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 2px rgba(187, 62, 3, 0.15);
    }

    .tile.corner {
      background: rgba(254, 215, 170, 0.35);
      border-color: rgba(187, 62, 3, 0.24);
    }

    .tile small {
      display: block;
      opacity: 0.7;
      margin-top: 0;
      line-height: 1.2;
    }

    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      font-size: 12px;
      margin-right: 6px;
      margin-top: 6px;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 260px;
      overflow: auto;
      border-radius: 14px;
      background: #10151b;
      color: #e5f4ff;
      padding: 14px;
      margin: 0;
    }

    .players {
      display: grid;
      gap: 10px;
    }

    .player-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: white;
    }

    .player-card.current {
      border-color: var(--ok);
      box-shadow: inset 0 0 0 2px rgba(45, 106, 79, 0.12);
    }

    .meta {
      font-size: 14px;
      opacity: 0.75;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .board {
        gap: 6px;
      }

      .tile {
        padding: 6px;
        font-size: 10px;
      }

      .tile strong {
        font-size: 10px;
      }

      .board-center strong {
        font-size: 20px;
      }
    }

    @media (max-width: 640px) {
      .board-center {
        padding: 12px;
      }

      .board-center .meta {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <section class="panel stack">
      <div>
        <h1>Deupoly</h1>
        <div class="meta">Авторитарный сервер FastAPI + WebSocket</div>
      </div>

      <div class="stack">
        <input id="player-name" placeholder="Имя игрока" value="Игрок 1" />
        <button id="create-game">Создать игру</button>
        <input id="game-id" placeholder="ID игры" />
        <button id="join-game" class="secondary">Войти в игру</button>
        <button id="start-game">Начать игру</button>
      </div>

      <div class="stack">
        <button id="roll-dice">Бросить кубики</button>
        <button id="buy-property">Купить клетку</button>
        <button id="decline-property" class="secondary">Отказаться от покупки</button>
        <button id="start-auction" class="secondary">Запустить аукцион</button>
        <input id="bid-value" type="number" min="0" placeholder="Ставка" />
        <button id="place-bid">Сделать ставку</button>
        <button id="pass-auction" class="warn">Пас</button>
        <button id="leave-jail" class="secondary">Заплатить 50 и выйти</button>
        <button id="end-turn">Завершить ход</button>
      </div>

      <div class="stack">
        <h3>Сессия</h3>
        <div id="session" class="meta">Нет активной сессии</div>
      </div>

      <div class="stack">
        <h3>Лог</h3>
        <pre id="log"></pre>
      </div>
    </section>

    <section class="panel stack">
      <div>
        <h2>Игроки</h2>
        <div id="players" class="players"></div>
      </div>

      <div>
        <h2>Поле</h2>
        <div id="board" class="board"></div>
      </div>

      <div>
        <h2>Состояние</h2>
        <pre id="state"></pre>
      </div>
    </section>
  </div>

  <script>
    const sessionNode = document.getElementById("session");
    const logNode = document.getElementById("log");
    const stateNode = document.getElementById("state");
    const boardNode = document.getElementById("board");
    const playersNode = document.getElementById("players");
    const gameIdInput = document.getElementById("game-id");
    const playerNameInput = document.getElementById("player-name");
    const bidValueInput = document.getElementById("bid-value");

    let ws = null;
    let state = null;
    let playerId = null;
    let gameId = null;
    const phaseLabels = {
      waiting_for_players: "ожидание игроков",
      waiting_for_roll: "ожидание броска",
      waiting_for_action: "ожидание действия",
      auction_active: "идёт аукцион",
      finished: "завершена"
    };
    const tileTypeLabels = {
      start: "старт",
      property: "недвижимость",
      transport: "транспорт",
      tax: "налог",
      chance: "событие",
      jail: "тюрьма",
      audit: "проверка",
      jackpot: "джекпот"
    };
    const boardPositions = [
      [11, 11],
      [11, 10], [11, 9], [11, 8], [11, 7], [11, 6], [11, 5], [11, 4], [11, 3], [11, 2],
      [11, 1],
      [10, 1], [9, 1], [8, 1], [7, 1], [6, 1], [5, 1], [4, 1], [3, 1], [2, 1],
      [1, 1],
      [1, 2], [1, 3], [1, 4], [1, 5], [1, 6], [1, 7], [1, 8], [1, 9], [1, 10],
      [1, 11],
      [2, 11], [3, 11], [4, 11], [5, 11], [6, 11], [7, 11], [8, 11], [9, 11], [10, 11]
    ];

    const log = (message) => {
      const timestamp = new Date().toLocaleTimeString();
      logNode.textContent = `[${timestamp}] ${message}\n` + logNode.textContent;
    };

    const api = async (url, options = {}) => {
      const response = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || "Ошибка запроса");
      }
      return response.json();
    };

    const connectWs = () => {
      if (!gameId || !playerId) return;
      if (ws) ws.close();

      const protocol = window.location.protocol === "https:" ? "wss" : "ws";
      ws = new WebSocket(`${protocol}://${window.location.host}/api/ws/games/${gameId}?player_id=${playerId}`);

      ws.onopen = () => log("WebSocket подключён");
      ws.onmessage = (event) => {
        const message = JSON.parse(event.data);
        if (message.type === "error") {
          log(`Ошибка: ${message.payload.message}`);
          return;
        }
        if (message.payload?.card?.title) {
          log(`Карточка события: ${message.payload.card.title}`);
        }
        if (message.payload?.message) {
          log(message.payload.message);
        }
        if (message.state) {
          state = message.state;
          renderState();
        }
        if (message.type === "dice_result" && message.payload?.dice) {
          const dice = message.payload.dice;
          log(`Кубики: ${dice.first} + ${dice.second} = ${dice.total}`);
        }
      };
      ws.onclose = () => log("WebSocket отключён");
    };

    const renderState = () => {
      if (!state) return;
      stateNode.textContent = JSON.stringify(state, null, 2);
      sessionNode.textContent = `игра=${state.id} игрок=${playerId || "-"} фаза=${phaseLabels[state.phase] || state.phase} раунд=${state.round}`;
      renderPlayers();
      renderBoard();
      if (state.last_event) {
        log(`Состояние: ${state.last_event}`);
      }
    };

    const renderPlayers = () => {
      playersNode.innerHTML = "";
      const currentPlayerId = state.players[state.current_turn]?.id;
      state.players.forEach((player) => {
        const card = document.createElement("div");
        card.className = `player-card ${player.id === currentPlayerId ? "current" : ""}`;
        card.innerHTML = `
          <strong>${player.name}</strong>
          <div class="meta">Деньги: ${player.money} | Позиция: ${player.position} | Отказы: ${player.refusals_used}/4</div>
          <div class="meta">Тюрьма: ${player.in_jail ? `да (${player.jail_turns})` : "нет"} | Онлайн: ${player.is_connected ? "да" : "нет"}</div>
          <div>${player.properties.map((id) => `<span class="pill">#${id}</span>`).join("") || "<span class='meta'>Нет активов</span>"}</div>
        `;
        playersNode.appendChild(card);
      });
    };

    const renderBoard = () => {
      boardNode.innerHTML = "";
      const centerNode = document.createElement("div");
      centerNode.className = "board-center";
      centerNode.innerHTML = `
        <div>
          <strong>Deupoly</strong>
          <div class="meta">Раунд: ${state.round}</div>
          <div class="meta">Фаза: ${phaseLabels[state.phase] || state.phase}</div>
          <div class="meta">Текущий ход: ${state.players[state.current_turn]?.name || "-"}</div>
          <div class="meta">${state.last_event || "Ожидание действий игроков"}</div>
        </div>
      `;
      boardNode.appendChild(centerNode);

      state.board.forEach((tile) => {
        const owners = state.players.filter((player) => player.position === tile.id).map((player) => player.name);
        const tileNode = document.createElement("div");
        const [row, column] = boardPositions[tile.id];
        const isCorner = [0, 10, 20, 30].includes(tile.id);
        tileNode.className = `tile ${owners.length ? "active" : ""} ${isCorner ? "corner" : ""}`.trim();
        tileNode.style.gridRow = String(row);
        tileNode.style.gridColumn = String(column);
        tileNode.innerHTML = `
          <strong>#${tile.id} ${tile.name}</strong>
          <small>${tileTypeLabels[tile.type] || tile.type}</small>
          <small>Цена: ${tile.price} | Аренда: ${tile.base_rent}</small>
          <small>Владелец: ${tile.owner_id || "-"}</small>
          <small>Игроки: ${owners.join(", ") || "-"}</small>
        `;
        boardNode.appendChild(tileNode);
      });
    };

    const sendAction = (action, payload = {}) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log("WebSocket не подключён");
        return;
      }
      ws.send(JSON.stringify({ action, payload }));
    };

    document.getElementById("create-game").onclick = async () => {
      const data = await api("/api/games", {
        method: "POST",
        body: JSON.stringify({ max_players: 4 })
      });
      gameId = data.game_id;
      gameIdInput.value = gameId;
      log(`Создана игра ${gameId}`);
    };

    document.getElementById("join-game").onclick = async () => {
      gameId = gameIdInput.value.trim();
      if (!gameId) return;
      const data = await api(`/api/games/${gameId}/players`, {
        method: "POST",
        body: JSON.stringify({ name: playerNameInput.value.trim() || "Игрок" })
      });
      playerId = data.player.id;
      state = data.state;
      renderState();
      connectWs();
      log(`Подключение к игре как ${data.player.name}`);
    };

    document.getElementById("start-game").onclick = async () => {
      gameId = gameIdInput.value.trim();
      await api(`/api/games/${gameId}/start`, { method: "POST" });
      log("Игра началась");
    };

    document.getElementById("roll-dice").onclick = () => sendAction("roll_dice");
    document.getElementById("buy-property").onclick = () => sendAction("buy_property");
    document.getElementById("decline-property").onclick = () => sendAction("decline_property");
    document.getElementById("start-auction").onclick = () => sendAction("start_auction");
    document.getElementById("leave-jail").onclick = () => sendAction("leave_jail");
    document.getElementById("end-turn").onclick = () => sendAction("end_turn");
    document.getElementById("place-bid").onclick = () => sendAction("place_bid", { bid: Number(bidValueInput.value || 0) });
    document.getElementById("pass-auction").onclick = () => sendAction("pass_auction");
  </script>
</body>
</html>
