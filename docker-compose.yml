version: "3.9"

services:
  backend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://deupoly:deupoly@postgres:5432/deupoly
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-me-now
      VIDEO_STUN_URLS: '["stun:stun.l.google.com:19302"]'
      VIDEO_TURN_URL:
      VIDEO_TURN_USERNAME:
      VIDEO_TURN_PASSWORD:
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: deupoly
      POSTGRES_USER: deupoly
      POSTGRES_PASSWORD: deupoly
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deupoly -d deupoly"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    networks:
      app:
      proxy:
        aliases:
          - deupoly-nginx

volumes:
  postgres_data:

networks:
  app:
    driver: bridge
  proxy:
    external: true
    name: proxy
